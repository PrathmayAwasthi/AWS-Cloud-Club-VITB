<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2A003A" />
    <meta name="description" content="AWS Cloud Club - Empowering the next generation of cloud enthusiasts and developers. Join our community to learn, innovate, and build with AWS services." />
    <meta name="keywords" content="AWS, Cloud Computing, Amazon Web Services, Cloud Club, Developer Community, Workshops, Certification, Serverless, Lambda" />
    <meta name="author" content="AWS Cloud Club" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://awscloudclub.com/" />
    <meta property="og:title" content="AWS Cloud Club - Innovate. Learn. Build." />
    <meta property="og:description" content="Empowering the next generation of cloud enthusiasts and developers. Join our community to learn, innovate, and build with AWS services." />
    <meta property="og:image" content="%PUBLIC_URL%/aws-cloud-club-banner.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://awscloudclub.com/" />
    <meta property="twitter:title" content="AWS Cloud Club - Innovate. Learn. Build." />
    <meta property="twitter:description" content="Empowering the next generation of cloud enthusiasts and developers. Join our community to learn, innovate, and build with AWS services." />
    <meta property="twitter:image" content="%PUBLIC_URL%/aws-cloud-club-banner.jpg" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <title>AWS Cloud Club - Innovate. Learn. Build.</title>
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AWS Cloud Club",
      "description": "Empowering the next generation of cloud enthusiasts and developers",
      "url": "https://awscloudclub.com",
      "logo": "https://awscloudclub.com/logo192.png",
      "sameAs": [
        "https://twitter.com/awscloudclub",
        "https://linkedin.com/company/awscloudclub"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@awscloudclub.com",
        "contactType": "General Inquiry"
      }
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif; background: linear-gradient(to bottom right, #2A003A, #111111); color: white; min-height: 100vh;">
        <h1>AWS Cloud Club</h1>
        <p>You need to enable JavaScript to run this app.</p>
        <p>Please enable JavaScript in your browser settings and refresh the page.</p>
      </div>
    </noscript>
    <div id="root"></div>
    
    <!-- Performance monitoring (optional) -->
    <script>
      // Basic performance monitoring
      window.addEventListener('load', function() {
        if ('performance' in window) {
          const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
          console.log('Page load time:', loadTime + 'ms');
        }
      });
    </script>
  </body>
</html>
